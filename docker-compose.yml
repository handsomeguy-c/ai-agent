services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jchatmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jchatmind}
      POSTGRES_USER: ${POSTGRES_USER:-jchatmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jchatmind_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./jchatmind_assert/jchatmind.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
  ollama:
    image: ollama/ollama:latest
    container_name: jchatmind-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: jchatmind-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
  backend:
    build:
      context: ./jchatmind
    image: jchatmind-backend:latest
    container_name: jchatmind-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jchatmind}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-jchatmind}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-jchatmind_password}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      ZHIPUAI_BASE_URL: ${ZHIPUAI_BASE_URL:-https://open.bigmodel.cn/api/paas}
      RAG_EMBEDDING_BASE_URL: ${RAG_EMBEDDING_BASE_URL:-http://ollama:11434}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-bge-m3}
      DOCUMENT_STORAGE_BASE_PATH: /app/data/documents
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*,http://frontend}
      APP_MCP_ENABLED: ${APP_MCP_ENABLED:-false}
      APP_MCP_SERVERS_0_NAME: ${APP_MCP_SERVERS_0_NAME:-}
      APP_MCP_SERVERS_0_ENDPOINT: ${APP_MCP_SERVERS_0_ENDPOINT:-}
      APP_MCP_SERVERS_0_DESCRIPTION: ${APP_MCP_SERVERS_0_DESCRIPTION:-}
      APP_ELASTICSEARCH_ENABLED: ${APP_ELASTICSEARCH_ENABLED:-true}
      APP_ELASTICSEARCH_BASE_URL: ${APP_ELASTICSEARCH_BASE_URL:-http://elasticsearch:9200}
      APP_ELASTICSEARCH_INDEX_NAME: ${APP_ELASTICSEARCH_INDEX_NAME:-jchatmind_chunks}
      APP_RERANK_ENABLED: ${APP_RERANK_ENABLED:-false}
      APP_RERANK_ENDPOINT: ${APP_RERANK_ENDPOINT:-http://reranker:8080/rerank}
      APP_RERANK_MODEL: ${APP_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      APP_QUERY_REWRITE_LLM_ENABLED: ${APP_QUERY_REWRITE_LLM_ENABLED:-true}
      APP_QUERY_REWRITE_MODEL: ${APP_QUERY_REWRITE_MODEL:-deepseek-chat}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - document_data:/app/data/documents
  frontend:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: /api
    image: jchatmind-frontend:latest
    container_name: jchatmind-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  ollama_data:
  document_data:
  elasticsearch_data:
